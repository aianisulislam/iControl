    <title>iControl</title>
    <style>
      :root {
        --color-bg: #0b1220;
        --color-text: #e5e7eb;
        --color-text-muted: #c1cbda;
        --color-button: #18223b;
        --color-button-active: #283861;
        --color-border: rgba(71, 85, 105, 0.35);
        --color-border-accent: rgba(71, 85, 105, 0.5);
        --radius: 1.25rem;
        --radius-lg: 2.4rem;
        --gap: 0.65rem;
        --padding: 0.9rem;

        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--color-bg);
        user-select: none;
        color: var(--color-text);
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        touch-action: manipulation;
      }

      textarea,
      input {
        user-select: text;
        -webkit-user-select: text;
        touch-action: auto;
      }

      body {
        margin: 0;
        height: 100dvh;
        overscroll-behavior: none;
        overflow: hidden;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: var(--gap);
        position: relative;
        transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        background:
          radial-gradient(circle at top, rgba(5, 2, 59, 0.6), transparent 38%),
          linear-gradient(180deg, var(--color-bg), #020617);
      }

      body.drawer-open{
        transform: translateX(min(20rem, 88vw));
      }

      header,
      main {
        width: min(34rem, calc(100vw - 2rem));
        margin: 0 auto;
      }

      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: var(--gap);
        min-height: 0;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header-button {
        width: 36px;
        height: 36px;
      }

      h1 {
        margin: 0;
        font-size: 1.4rem;
        line-height: 1;
        font-weight: 500;
      }

      .connection-status {
        background-color: color-mix(in srgb, currentColor 20%, transparent);
        line-height: 0.6;
        height: 24px;
        aspect-ratio: 1;
        border-radius: 50%;
      }

      .status-text {
        position: absolute;
        top: 24px;
        right: 0;
        border-radius: 12px 0 0 12px;
        border: 1px solid currentColor;
        border-right-width: 0;
        height: 20px;
        padding: 6px 6px;
        font-size: 12px;
        line-height: 0.5;
        background-color: color-mix(in srgb, currentColor 20%, transparent);
      }

      .dot {
        height: 6px;
        aspect-ratio: 1;
        border-radius: 3px;
        background-color: currentColor;
      }

      p {
        margin: 0;
      }

      .flex {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #buttons-wrapper {
        padding: var(--padding);
        border-radius: var(--radius-lg);
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid var(--color-border);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(10px);
      }
      .tab-title-wrapper {
        margin-bottom: 0.75rem;
        max-width: 100%;
        overflow: hidden;
      }

      .tab-title {
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--color-text-muted);
        transition: all 0.2s ease;
        line-height: 1.2rem;
        border-bottom: 2px solid transparent;
        padding: 0 var(--gap) 0.5rem var(--gap);
      }
      .tab-title.active {
        border-bottom: 2px solid var(--color-text);
        color: var(--color-text);
      }

      #touchpad-wrapper {
        flex: 1;
        min-height: 0;
        border-radius: var(--radius-lg);
        background: linear-gradient(
          180deg,
          rgba(25, 42, 96, 0.25),
          rgba(0, 0, 0, 0.25)
        );
        border: 1px solid var(--color-border-accent);
        overflow: hidden;
        position: relative;
      }

      #touchpad {
        height: calc(100% - 60px);
        margin-bottom: 0.75rem;
        user-select: none;
        touch-action: none;
      }

      #cursorPad {
        touch-action: none;
      }

      #touchpad.drag-mode {
        background: rgba(180, 100, 255, 0.08);
      }

      #cursorPad.select-mode {
        background: rgba(100, 150, 255, 0.2) !important;
      }

      #touchpad-buttons {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        display: flex;
        gap: 2px;
      }

      #touchpad-buttons button {
        height: 48px;
        border-radius: 0;
      }

      #touchpad-buttons > :first-child,
      #touchpad-buttons > :last-child {
        flex: 1;
      }

      #touchpad-buttons > :nth-child(2) {
        width: 80px;
        flex-shrink: 0;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: var(--radius);
        display: flex;
        align-items: center;
        justify-content: center;
        font: inherit;
        background: var(--color-button);
        color: var(--color-text-muted);
        cursor: pointer;
        transition: all 0.2s ease;
        font-size: 12px;
        position: relative;
      }

      button.active,
      button:active {
        background: var(--color-button-active);
        color: var(--color-text);
      }

      .grid {
        display: grid;
        gap: var(--gap);
      }
      .grid-3 {
        grid-template-columns: repeat(3, 1fr);
      }
      .grid-4 {
        grid-template-columns: repeat(4, 1fr);
      }
      .col-2 {
        grid-column: span 2;
      }
      .row-2 {
        grid-row: span 2;
      }
      .col-3 {
        grid-column: span 3;
      }
      .row-3 {
        grid-row: span 3;
      }
      .col-4 {
        grid-column: span 4;
      }
      .row-4 {
        grid-row: span 4;
      }

      .tab {
        max-width: 340px;
        min-height: 280px;
        margin: auto;
      }
      .tab:not(.active) {
        display: none;
      }
      .tab > * {
        min-height: 60px;
      }

      .ipod-wheel {
        position: relative;
        width: 220px;
        height: 220px;
        margin: 0 auto 0.75rem;
        border-radius: 50%;
        background: radial-gradient(
          circle at 40% 40%,
          rgba(69, 85, 134, 0.25),
          rgba(0, 0, 0, 0.25)
        );
        border: 2px solid var(--color-border-accent);
        box-shadow:
          inset 0 2px 8px rgba(0, 0, 0, 0.6),
          0 8px 20px rgba(0, 0, 0, 0.4);
      }

      .wheel-button,
      .wheel-center {
        position: absolute;
        border-radius: 50%;
        background: transparent;
        border: none;
        cursor: pointer;
        transition: all 0.2s ease;
        color: var(--color-text);
        padding: 0;
      }

      .wheel-button {
        width: 72px;
        height: 72px;
      }

      .wheel-button:active {
        background: var(--color-button-active);
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
      }

      .wheel-center {
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 72px;
        height: 72px;
        border: 2px solid rgba(71, 85, 105, 0.6);
        background: var(--color-button);
        box-shadow:
          inset 0 2px 4px rgba(0, 0, 0, 0.4),
          0 4px 8px rgba(0, 0, 0, 0.3);
      }

      .wheel-center:active {
        background: #0f1729;
        box-shadow:
          inset 0 3px 6px rgba(0, 0, 0, 0.6),
          0 2px 4px rgba(0, 0, 0, 0.3);
      }

      .wheel-button-up {
        top: 0;
        left: 50%;
        transform: translateX(-50%);
      }

      .wheel-button-down {
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
      }

      .wheel-button-left {
        left: 0;
        top: 50%;
        transform: translateY(-50%);
      }

      .wheel-button-right {
        right: 0;
        top: 50%;
        transform: translateY(-50%);
      }

      .slider {
        position: relative;
        background: var(--color-button);
        border-radius: var(--radius);
        overflow: hidden;
        touch-action: none;
      }

      .slider-fill {
        position: absolute;
        bottom: 0;
        width: 100%;
        background: var(--color-button-active);
      }

      .slider-icon {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translate(-50%);
        pointer-events: none;
        z-index: 5;
      }

      textarea,
      input {
        width: 100%;
        height: 100%;
        padding: 0.75rem;
        border-radius: var(--radius);
        border: 1px solid var(--color-border);
        background: var(--color-button);
        color: var(--color-text);
        font: inherit;
        resize: none;
      }

      #textModeToggle {
        background: var(--color-button);
        border-radius: var(--radius);
        width: 100%;
        height: 100%;
        display: flex;
      }
      #textModeToggle > button {
        background: transparent;
        font-size: 14px;
      }
      #textModeToggle > button.active {
        background: var(--color-button-active);
        font-weight: bold;
      }
      #textModeToggle > button.active:active {
        background: var(--color-text-muted);
      }

      /* ── Settings Drawer ── */
      #drawer-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 100;
        background-color: black;
        opacity: 0.6;
      }
      #drawer-overlay.open {
        display: block;
      }

      #settings-drawer {
        position: fixed;
        top: 0;
        left: 0;
        height: 100dvh;
        width: min(20rem, 88vw);
        background:
          radial-gradient(circle at top, rgba(5, 2, 59, 0.6), transparent 38%),
          linear-gradient(180deg, var(--color-bg), #020617);
        border-right: 1px solid var(--color-border);
        z-index: 101;
        transform: translateX(-100%);
        overflow-y: auto;
        padding: var(--padding);
      }

      #drawer-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      #drawer-close {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .drawer-section {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .drawer-label {
        display: flex;
        justify-content: space-between;
        font-size: 0.8rem;
        color: var(--color-text-muted);
        margin-top: 0.5rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        line-height: 1.2rem;
        margin-top: 24px;
        margin-bottom: 12px;
      }
      .drawer-value {
        font-variant-numeric: tabular-nums;
        color: var(--color-text);
      }
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 4px;
        border-radius: 2px;
        background: var(--color-button-active);
        outline: none;
        cursor: pointer;
        border: none;
        padding: 0;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--color-text);
        cursor: pointer;
      }
    </style>
  </head>

    <script>
      window.addEventListener("contextmenu", (e) => e.preventDefault());

      const status = document.getElementById("reconnect");
      let socket;
      let modifiers = {
        shift: false,
        ctrl: false,
        opt: false,
        cmd: false,
      };

      let activeTab = localStorage.getItem("active-tab") ?? "media";

      let touchpadSensitivity = parseFloat(
        localStorage.getItem("sens-touchpad") ?? "1",
      );
      let scrollSensitivity = parseFloat(
        localStorage.getItem("sens-scroll") ?? "1",
      );
      let cursorpadSensitivity = parseFloat(
        localStorage.getItem("sens-cursorpad") ?? "1",
      );

      /* ====================================
       * Connection handling
       * ==================================== */

      let connectingPromise = null;

      const connectWebSocket = () => {
        if (connectingPromise) return connectingPromise;
        const statusText = document.createElement("div");
        statusText.classList.add("status-text");
        statusText.innerText = "CONNECTING";
        document.body.appendChild(statusText);
        connectingPromise = new Promise((resolve, reject) => {
          socket = new WebSocket(`ws://air15.local:4040`);

          socket.addEventListener("open", () => {
            status.style.color = "#22c55e";
            statusText.style.color = "#22c55e";
            statusText.innerText = "CONNECTED";
            setTimeout(() => statusText.remove(), 1000);
            connectingPromise = null;
            resolve();
          });

          socket.addEventListener("close", () => {
            status.style.color = "#f87171";
            statusText.innerText = "NOT CONNECTED";
            setTimeout(() => statusText.remove(), 1000);
            statusText.style.color = "#f87171";
            connectingPromise = null;
          });

          socket.addEventListener("error", () => {
            status.style.color = "#f87171";
            statusText.style.color = "#f87171";
            statusText.innerText = "NOT CONNECTED";
            setTimeout(() => statusText.remove(), 1000);
            connectingPromise = null;
            reject();
          });
        });

        return connectingPromise;
      };

      connectWebSocket();
      const checkAndReconnectWebSocket = () =>
        socket?.readyState !== WebSocket.OPEN && connectWebSocket();
      window.addEventListener(
        "visibilitychange",
        () =>
          document.visibilityState === "visible" &&
          checkAndReconnectWebSocket(),
      );
      const send = (payload) => {
        console.log("Sending command:", payload);
        const sendAction = () => socket.send(JSON.stringify(payload));
        if (socket?.readyState === WebSocket.OPEN) {
          try {
            sendAction();
          } catch (error) {
            // Zombie OPEN scenario
            socket?.close();
            connectWebSocket().then(sendAction);
          }
        } else {
          connectWebSocket().then(sendAction);
        }
      };

      /* ====================================
       * Incoming message handling
       * ==================================== */
      socket.addEventListener("message", (event) => {
        let payload;

        try {
          payload = JSON.parse(event.data);
        } catch {
          return;
        }

        if (payload.type === "state") {
          if (payload.volume !== undefined) {
            const volumeSlider = document.querySelector(
              '.slider[data-control="setVolume"]',
            );
            if (volumeSlider) {
              volumeSlider.dataset.value = payload.volume;
              const fill = volumeSlider.querySelector(".slider-fill");
              if (fill) {
                fill.style.height = payload.volume + "%";
              }
            }
          }
        }
      });

      /* ====================================
       * Initialize the tabs
       * ==================================== */
      const tabTitles = document.querySelectorAll(".tab-title");
      const tabs = document.querySelectorAll(".tab");
      tabTitles.forEach((title, index) => {
        title.addEventListener("click", () => {
          modifiers = {
            shift: false,
            ctrl: false,
            opt: false,
            cmd: false,
          };
          tabTitles.forEach((t, tIdx) =>
            tIdx === index
              ? t.classList.add("active")
              : t.classList.remove("active"),
          );
          tabs.forEach((t, tIdx) =>
            tIdx === index
              ? t.classList.add("active")
              : t.classList.remove("active"),
          );
          activeTab = title.textContent.trim().toLowerCase();
          localStorage.setItem("active-tab", activeTab);
        });
      });

      // Restore active tab on load
      const savedIndex = [...tabTitles].findIndex(
        (t) => t.textContent.trim().toLowerCase() === activeTab,
      );
      if (savedIndex > 0) {
        tabTitles.forEach((t, i) =>
          i === savedIndex
            ? t.classList.add("active")
            : t.classList.remove("active"),
        );
        tabs.forEach((t, i) =>
          i === savedIndex
            ? t.classList.add("active")
            : t.classList.remove("active"),
        );
      }

      /* ====================================
       * Initialize the sliders
       * ==================================== */
      const sliders = document.querySelectorAll(".slider");
      sliders.forEach((slider) => {
        const sliderFill = document.createElement("div");
        sliderFill.classList.add("slider-fill");
        sliderFill.style.height = slider.dataset.value + "%";
        slider.appendChild(sliderFill);
        let dragging = false;

        slider.addEventListener("pointerdown", (e) => {
          dragging = true;
          slider.setPointerCapture(e.pointerId);
          slideHandler(e, slider, sliderFill);
        });

        slider.addEventListener("pointermove", (e) => {
          if (!dragging) return;
          slideHandler(e, slider, sliderFill);
        });

        slider.addEventListener("pointerup", (e) => {
          dragging = false;
          slider.releasePointerCapture(e.pointerId);
        });
      });

      const slideHandler = (event, element, fillElement) => {
        const rect = element.getBoundingClientRect();
        let value = 1 - (event.clientY - rect.top) / rect.height;
        value = 100 * Math.max(0, Math.min(1, value));
        fillElement.style.height = value + "%";
        element.dataset.value = value;
        send({
          type: "system",
          action: element.dataset.control,
          value: Math.round(value),
        });
      };

      /* ====================================
       * Initialize the modifiers
       * ==================================== */
      document.querySelectorAll("[data-modifier]").forEach((button) => {
        button.addEventListener("click", () => {
          const mod = button.dataset.modifier;
          modifiers[mod] = !modifiers[mod];
          button.classList.toggle("active", modifiers[mod]);
        });
      });

      /* ====================================
       * Initialize command buttons
       * ==================================== */
      const LONGPRESS_DELAY = 400;
      const LONGPRESS_INTERVAL = 120;

      document.querySelectorAll("[data-command]").forEach((button) => {
        let holdTimer = null;
        let repeatTimer = null;
        let isLongPress = false;

        // Long press — only on buttons that have data-longpress-command
        if (button.dataset.longpressCommand) {
          const startRepeat = () => {
            isLongPress = true;
            const command = JSON.parse(button.dataset.longpressCommand);
            send(command);
            repeatTimer = setInterval(() => send(command), LONGPRESS_INTERVAL);
          };

          const stop = () => {
            clearTimeout(holdTimer);
            clearInterval(repeatTimer);
            holdTimer = null;
            repeatTimer = null;
          };

          button.addEventListener("pointerdown", (e) => {
            isLongPress = false;
            holdTimer = setTimeout(startRepeat, LONGPRESS_DELAY);
          });

          button.addEventListener("pointerup", stop);
          button.addEventListener("pointercancel", stop);
          button.addEventListener("pointerleave", stop);
        }

        // Click — short tap or click, fires normally unless long press consumed it
        button.addEventListener("click", () => {
          if (isLongPress) {
            isLongPress = false;
            return;
          }
          const commandJSON = JSON.parse(button.dataset.command);
          if (commandJSON.type === "key" && activeTab === "general") {
            const modifierPrefix = Object.keys(modifiers)
              .filter((mod) => modifiers[mod])
              .join("+");
            if (modifierPrefix) {
              commandJSON.key = modifierPrefix + "+" + commandJSON.key;
            }
          }
          send(commandJSON);
        });
      });

      /* ====================================
       * Initialize the text input
       * ==================================== */
      let textMode = "draft";
      const textModeToggle = document.getElementById("textModeToggle");
      const direct = document.getElementById("textModeDirect");
      const draft = document.getElementById("textModeDraft");
      const textInput = document.getElementById("draftText");
      const textInputContainer = document.getElementById("textInputContainer");
      let proxyInput;
      // direct.addEventListener("click", () => {
      //   if (textMode === "direct") {
      //     return;
      //   }
      //   direct.classList.add("active");
      //   draft.classList.remove("active");
      //   draft.innerHTML = "Draft";
      //   textMode = "direct";
      //   textInput.value = "";
      //   textInput.blur();
      //   textInput.setAttribute("disabled", "");
      //   proxyInput = document.createElement("input");
      //   proxyInput.type = "url";
      // });
      draft.addEventListener("click", () => {
        if (textMode === "draft") {
          send({ type: "text", value: textInput.value });
          textInput.value = "";
          textInput.focus();
          return;
        }
        proxyInput.remove();
        draft.classList.add("active");
        // direct.classList.remove("active");
        draft.innerHTML = "Send";
        textMode = "draft";
        textInput.value = "";
        textInput.removeAttribute("disabled");
        textInput.focus();
      });

      /* ====================================
       * Initialize the text cursor pad
       * ==================================== */
      const HORIZONTAL_STEP_SIZE = 6;
      const VERTICAL_STEP_SIZE = 16;

      let isCursorSelecting = false;
      let cursorHoldTimer = null;
      const CURSOR_HOLD_DURATION = 350;

      const onTouchMove = (e) => {
        e.stopPropagation();
        if (cursorHoldTimer) {
          clearTimeout(cursorHoldTimer);
          cursorHoldTimer = null;
        }
        const t = e.touches[0];

        const x = t.clientX;
        const y = t.clientY;

        if (textCursorLastX === null || textCursorLastY === null) {
          textCursorLastX = x;
          textCursorLastY = y;
          return;
        }

        const dx = x - textCursorLastX;
        const dy = y - textCursorLastY;

        if (
          Math.abs(dx) > HORIZONTAL_STEP_SIZE / cursorpadSensitivity ||
          Math.abs(dy) > VERTICAL_STEP_SIZE / cursorpadSensitivity
        ) {
          let direction;

          if (Math.abs(dx) > Math.abs(dy)) {
            direction = dx > 0 ? "right" : "left";
          } else {
            direction = dy > 0 ? "down" : "up";
          }
          send({ type: "key", key: isCursorSelecting ? `shift+${direction}` : direction });
          textCursorLastX = x;
          textCursorLastY = y;
        }
      };

      const resetTouch = () => {
        if (cursorHoldTimer) {
          clearTimeout(cursorHoldTimer);
          cursorHoldTimer = null;
        }
        isCursorSelecting = false;
        cursorPad.classList.remove("select-mode");
        textCursorLastX = null;
        textCursorLastY = null;
      };
      const cursorPad = document.getElementById("cursorPad");
      cursorPad.addEventListener("touchstart", (e) => {
        e.stopPropagation();
        isCursorSelecting = false;
        textCursorLastX = null;
        textCursorLastY = null;
        if (cursorHoldTimer) clearTimeout(cursorHoldTimer);
        cursorHoldTimer = setTimeout(() => {
          cursorHoldTimer = null;
          isCursorSelecting = true;
          cursorPad.classList.add("select-mode");
        }, CURSOR_HOLD_DURATION);
      }, { passive: true });
      cursorPad.addEventListener("touchmove", onTouchMove, { passive: true });
      cursorPad.addEventListener("touchend", resetTouch);
      cursorPad.addEventListener("touchcancel", resetTouch);
      let textCursorLastX = null;
      let textCursorLastY = null;

      /* ====================================
       * Initialize the reconnect button
       * ==================================== */
      status.addEventListener("click", () => {
        checkAndReconnectWebSocket();
      });

      /* ====================================
       * Initialize the touch surface
       * ==================================== */
      const attachTouchSurface = (element, moveType) => {
        let startTouches = [];
        let lastPoint = null;
        let moved = false;
        let tapCount = 0;
        let lastTapTime = 0;
        let tapTimeout = null;
        let isDragging = false;
        let holdTimer = null;
        const HOLD_DURATION = 350;
        const DRAG_CANCEL_THRESHOLD = 8;

        element.addEventListener(
          "touchstart",
          (event) => {
            event.preventDefault();
            startTouches = Array.from(event.touches).map((touch) => ({
              x: touch.clientX,
              y: touch.clientY,
            }));
            lastPoint = startTouches[0] || null;
            moved = false;
            isDragging = false;
            if (holdTimer) clearTimeout(holdTimer);
            holdTimer = setTimeout(() => {
              holdTimer = null;
              isDragging = true;
              element.classList.add("drag-mode");
              send({ type: "mouseDown", button: "left" });
            }, HOLD_DURATION);
          },
          { passive: false },
        );

        element.addEventListener(
          "touchmove",
          (event) => {
            event.preventDefault();
            const touches = Array.from(event.touches);
            if (!touches.length) {
              return;
            }

            if (touches.length === 1) {
              const point = { x: touches[0].clientX, y: touches[0].clientY };
              if (holdTimer && startTouches.length) {
                const tdx = Math.abs(point.x - startTouches[0].x);
                const tdy = Math.abs(point.y - startTouches[0].y);
                if (tdx > DRAG_CANCEL_THRESHOLD || tdy > DRAG_CANCEL_THRESHOLD) {
                  clearTimeout(holdTimer);
                  holdTimer = null;
                }
              }
              if (lastPoint) {
                send({
                  type: isDragging ? "dragMove" : moveType,
                  dx: (point.x - lastPoint.x) * touchpadSensitivity,
                  dy: (point.y - lastPoint.y) * touchpadSensitivity,
                });
                moved = true;
              }
              lastPoint = point;
              return;
            }

            if (touches.length >= 2) {
              const average = {
                x: (touches[0].clientX + touches[1].clientX) / 2,
                y: (touches[0].clientY + touches[1].clientY) / 2,
              };
              if (lastPoint) {
                send({
                  type: "scroll",
                  dx: (average.x - lastPoint.x) * scrollSensitivity,
                  dy: (average.y - lastPoint.y) * scrollSensitivity,
                });
                moved = true;
              }
              lastPoint = average;
            }
          },
          { passive: false },
        );

        element.addEventListener(
          "touchend",
          (event) => {
            event.preventDefault();
            if (holdTimer) {
              clearTimeout(holdTimer);
              holdTimer = null;
            }
            if (isDragging) {
              isDragging = false;
              element.classList.remove("drag-mode");
              send({ type: "mouseUp", button: "left" });
              startTouches = [];
              lastPoint = null;
              return;
            }
            if (
              !moved &&
              startTouches.length === 1 &&
              event.touches.length === 0
            ) {
              const now = Date.now();
              if (now - lastTapTime > 200) {
                tapCount = 1;
              } else {
                tapCount++;
              }
              lastTapTime = now;

              if (tapTimeout) {
                clearTimeout(tapTimeout);
              }

              tapTimeout = setTimeout(() => {
                if (tapCount === 1) {
                  send({ type: "click", button: "left" });
                } else if (tapCount === 2) {
                  send({ type: "doubleClick", button: "left" });
                } else if (tapCount === 3) {
                  send({ type: "tripleClick", button: "left" });
                }
                tapCount = 0;
              }, 200);
            }
            startTouches = [];
            lastPoint = null;
          },
          { passive: false },
        );
      };

      attachTouchSurface(document.getElementById("touchpad"), "move");

      /* ====================================
       * Settings Drawer
       * ==================================== */
      const settingsDrawer = document.getElementById("settings-drawer");
      const drawerOverlay = document.getElementById("drawer-overlay");

      function openDrawer() {
        document.body.classList.add("drawer-open");
        drawerOverlay.classList.add("open");
      }
      function closeDrawer() {
        document.body.classList.remove("drawer-open");
        drawerOverlay.classList.remove("open");
      }

      document.getElementById("settings").addEventListener("click", openDrawer);
      document
        .getElementById("drawer-close")
        .addEventListener("click", closeDrawer);
      drawerOverlay.addEventListener("click", closeDrawer);
      drawerOverlay.addEventListener(
        "touchend",
        (e) => {
          e.preventDefault();
          closeDrawer();
        },
        { passive: false },
      );

      const sensSliders = [
        {
          id: "sensitivity-touchpad",
          valId: "val-touchpad",
          key: "sens-touchpad",
          get: () => touchpadSensitivity,
          set: (v) => {
            touchpadSensitivity = v;
          },
        },
        {
          id: "sensitivity-scroll",
          valId: "val-scroll",
          key: "sens-scroll",
          get: () => scrollSensitivity,
          set: (v) => {
            scrollSensitivity = v;
          },
        },
        {
          id: "sensitivity-cursorpad",
          valId: "val-cursorpad",
          key: "sens-cursorpad",
          get: () => cursorpadSensitivity,
          set: (v) => {
            cursorpadSensitivity = v;
          },
        },
      ];
      sensSliders.forEach(({ id, valId, key, set }) => {
        const slider = document.getElementById(id);
        const label = document.getElementById(valId);
        const stored = localStorage.getItem(key);
        if (stored) slider.value = stored;
        label.textContent = parseFloat(slider.value) + "x";
        slider.addEventListener("input", () => {
          const v = parseFloat(slider.value);
          set(v);
          label.textContent = v + "x";
          localStorage.setItem(key, v);
        });
      });
    </script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .catch((err) => console.error("SW registration failed:", err));
        });
        navigator.serviceWorker.addEventListener("message", (event) => {
          if (event.data?.type === "UPDATE_AVAILABLE") {
            window.location.reload();
          }
        });
      }
    </script>
  </body>
</html>
