<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>iControl</title>
    <style>
      :root {
        --color-bg: #0b1220;
        --color-text: #e5e7eb;
        --color-text-muted: #94a3b8;
        --color-button: #273045;
        --color-button-secondary: #1e293b;
        --color-button-active: #485871;
        --color-border: rgba(71, 85, 105, 0.35);
        --color-border-accent: rgba(71, 85, 105, 0.5);
        --radius: 0.9rem;
        --radius-lg: 1.1rem;
        --gap: 0.65rem;
        --padding: 0.9rem;

        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--color-bg);
        color: var(--color-text);
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        padding: 0.5rem;
        background:
          radial-gradient(
            circle at top,
            rgba(30, 41, 59, 0.6),
            transparent 38%
          ),
          linear-gradient(180deg, var(--color-bg), #020617);
      }

      header,
      main {
        width: min(34rem, calc(100vw - 1rem));
        margin: 0 auto;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      }

      h1 {
        margin: 0 0 0.25rem;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
      }

      .panel {
        padding: var(--padding);
        margin-bottom: var(--gap);
        border-radius: var(--radius-lg);
        background: rgba(15, 23, 42, 0.75);
        border: 1px solid var(--color-border);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(10px);
      }
      .tab-title-wrapper {
        display: flex;
        gap: calc(var(--gap) * 2);
        margin-bottom: 0.75rem;
        justify-content: center;
        align-items: center;
        max-width: 100%;
        overflow: hidden;
      }

      .tab-title {
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--color-text-muted);
        transition: all 0.2s ease;
        line-height: 1.2rem;
      }
      .tab-title.active {
        font-size: 0.85rem;
        font-weight: 700;
        color: var(--color-text);
      }

      .grid {
        display: grid;
        gap: var(--gap);
      }

      .grid-2 {
        grid-template-columns: repeat(2, 1fr);
      }

      .grid-3 {
        grid-template-columns: repeat(3, 1fr);
      }

      .grid-4 {
        grid-template-columns: repeat(4, 1fr);
      }

      #touchpad-wrapper {
        margin-bottom: var(--gap);
        border-radius: 1rem;
        background: linear-gradient(
          180deg,
          rgba(30, 41, 59, 0.9),
          rgba(15, 23, 42, 0.95)
        );
        border: 1px solid var(--color-border-accent);
        overflow: hidden;
      }

      .touchpad {
        min-height: 16rem;
        margin-bottom: 0.75rem;
        user-select: none;
        touch-action: none;
      }

      #touchpad-buttons {
        display: flex;
        gap: 2px;
      }

      #touchpad-buttons button {
        height: 48px;
        border-radius: 0;
      }

      #touchpad-buttons > :first-child,
      #touchpad-buttons > :last-child {
        flex: 1;
      }

      #touchpad-buttons > :nth-child(2) {
        width: 80px;
        flex-shrink: 0;
      }

      button:not(.icon, .wheel-button, .wheel-center, .arrow-pad button),
      input,
      textarea {
        width: 100%;
        border: 0;
        border-radius: var(--radius);
        padding: var(--padding) calc(var(--padding) * 1.05);
        font: inherit;
      }

      button {
        background: var(--color-button);
        color: var(--color-text-muted);
        cursor: pointer;
        transition: all 0.2s ease;
      }

      button.secondary {
        background: var(--color-button-secondary);
        color: var(--color-text);
        border: 1px solid var(--color-border-accent);
      }

      button.icon {
        width: 44px;
        height: 44px;
        padding: 0.5rem;
        border-radius: 50%;
      }

      input,
      textarea {
        background: #020617;
        color: var(--color-text);
        border: 1px solid rgba(71, 85, 105, 0.45);
      }

      textarea {
        resize: vertical;
        height: 12rem;
      }

      #textInput {
        margin-bottom: 0.75rem;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: var(--gap);
      }

      .fullwidth {
        width: 100%;
        padding: var(--padding);
      }

      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100dvh;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      .modal.hidden {
        display: none;
      }

      .modal-content {
        background: rgba(15, 23, 42, 0.95);
        padding: 1rem;
        border-radius: var(--radius-lg);
        width: min(90vw, 34rem);
        max-width: 600px;
        margin-top: -240px;
      }

      .ipod-wheel {
        position: relative;
        width: 220px;
        height: 220px;
        margin: 0 auto 0.75rem;
        border-radius: 50%;
        background: radial-gradient(
          circle at 30% 30%,
          rgba(71, 85, 105, 0.3),
          rgba(15, 23, 42, 0.9)
        );
        border: 2px solid var(--color-border-accent);
        box-shadow:
          inset 0 2px 8px rgba(0, 0, 0, 0.6),
          0 8px 20px rgba(0, 0, 0, 0.4);
      }

      .wheel-button,
      .wheel-center {
        position: absolute;
        border-radius: 50%;
        background: transparent;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s ease;
        color: var(--color-text);
        padding: 0;
      }

      .wheel-button {
        width: 72px;
        height: 72px;
      }

      .wheel-button:active {
        background: var(--color-button-secondary);
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
      }

      .wheel-center {
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 72px;
        height: 72px;
        border: 2px solid rgba(71, 85, 105, 0.6);
        background: var(--color-button-secondary);
        box-shadow:
          inset 0 2px 4px rgba(0, 0, 0, 0.4),
          0 4px 8px rgba(0, 0, 0, 0.3);
      }

      .wheel-center:active {
        background: #0f1729;
        box-shadow:
          inset 0 3px 6px rgba(0, 0, 0, 0.6),
          0 2px 4px rgba(0, 0, 0, 0.3);
      }

      .wheel-button-up {
        top: 0;
        left: 50%;
        transform: translateX(-50%);
      }

      .wheel-button-down {
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
      }

      .wheel-button-left {
        left: 0;
        top: 50%;
        transform: translateY(-50%);
      }

      .wheel-button-right {
        right: 0;
        top: 50%;
        transform: translateY(-50%);
      }

      .slider-group {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }

      .slider-group:last-child {
        margin-bottom: 0;
      }

      .slider-icon {
        min-width: 2rem;
        text-align: center;
      }

      .custom-slider {
        position: relative;
        height: 40px;
        background: var(--color-button);
        border-radius: 10px;
        width: 100%;
        touch-action: none;
      }

      .custom-slider .fill {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 0%;
        background: var(--color-text-muted);
        border-radius: 10px;
        pointer-events: none;
      }

      .system-controls {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: var(--gap);
      }

      .system-controls button {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
      }

      .arrow-pad {
        display: grid;
        grid-template-columns: repeat(3, 60px);
        gap: 0.4rem;
        margin: 0 auto 0.9rem;
        justify-content: center;
      }

      .arrow-pad button {
        width: 60px;
        height: 60px;
        border-radius: 0.6rem;
      }
      .arrow-pad button:not(.arrow-button) {
        border: none;
      }
      .arrow-pad .arrow-button {
        padding: 0;
      }

      .arrow-button-up {
        grid-column: 2;
        grid-row: 1;
      }

      .arrow-button-left {
        grid-column: 1;
        grid-row: 2;
      }

      .arrow-button-down {
        grid-column: 2;
        grid-row: 2;
      }

      .arrow-button-right {
        grid-column: 3;
        grid-row: 2;
      }

      .home-button {
        grid-column: 1;
        grid-row: 1;
      }
      .end-button {
        grid-column: 3;
        grid-row: 1;
      }
      .pgup-button {
        grid-column: 1;
        grid-row: 3;
      }
      .pgdn-button {
        grid-column: 3;
        grid-row: 3;
      }
      .shift-button {
        grid-column: 2;
        grid-row: 3;
      }
      .shift-button.active {
        background: var(--color-button-active);
      }

      .finder-actions {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: var(--gap);
      }

      .finder-actions button {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
      }
    </style>
  </head>

                  opacity="0"
                  width="19.9219"
                  x="0"
                  y="0"
                />
                <path
                  d="M1.05469 10.8281C1.05469 11.2734 1.39453 11.6016 1.83984 11.6133L5.03906 11.7773L16.3594 11.7773C18.6562 11.7773 19.5703 10.7578 19.5703 8.56641L19.5703 3.19922C19.5703 0.902344 18.6562 0 16.3594 0L11.5195 0C10.9336 0 10.5586 0.421875 10.5586 0.949219C10.5586 1.46484 10.9336 1.88672 11.5195 1.88672L16.3594 1.88672C17.3086 1.88672 17.6719 2.26172 17.6719 3.19922L17.6719 8.56641C17.6719 9.51562 17.3086 9.89062 16.3594 9.89062L5.03906 9.89062L1.83984 10.043C1.39453 10.0664 1.05469 10.3945 1.05469 10.8281ZM0 10.8281C0 11.0859 0.105469 11.332 0.316406 11.543L5.66016 16.7578C5.84766 16.9336 6.11719 17.0508 6.35156 17.0508C6.91406 17.0508 7.27734 16.6641 7.27734 16.1133C7.27734 15.8438 7.19531 15.6445 7.01953 15.4688L4.53516 13.0664L2.21484 11.1328L2.21484 10.5352L4.53516 8.60156L7.01953 6.1875C7.19531 6.02344 7.27734 5.8125 7.27734 5.54297C7.27734 4.99219 6.91406 4.61719 6.35156 4.61719C6.11719 4.61719 5.84766 4.72266 5.66016 4.91016L0.316406 10.125C0.105469 10.3242 0 10.5703 0 10.8281Z"
                  fill="white"
                  fill-opacity="0.85"
                />
              </svg>
            </button>
          </div>
          <div class="grid grid-2" style="margin-top: 0.75rem">
            <button id="closeTextModal" class="secondary">Close</button>
            <button id="sendText" class="secondary">Send</button>
          </div>
        </div>
      </div>

      <div id="settingsModal" class="modal hidden">
        <div class="modal-content">
          <h2>Settings</h2>
          <div style="margin-top: 1rem">
            <label
              >Movement Sensitivity: <span id="movementValue">1.5x</span></label
            >
            <div
              id="movementSensitivity"
              class="custom-slider"
              data-min="0.25"
              data-max="4"
              data-value="1.5"
              data-granularity="0.25"
              style="width: 100%; margin-top: 1.2rem"
            >
              <div class="fill"></div>
            </div>
          </div>
          <div style="margin-top: 1rem">
            <label>Scroll Sensitivity: <span id="scrollValue">1x</span></label>
            <div
              id="scrollSensitivity"
              class="custom-slider"
              data-min="0.25"
              data-max="4"
              data-value="1"
              data-granularity="0.25"
              style="width: 100%; margin-top: 1.2rem"
            >
              <div class="fill"></div>
            </div>
          </div>
          <div class="grid grid-1" style="margin-top: 1.5rem">
            <button id="closeSettingsModal" class="secondary">Close</button>
          </div>
        </div>
      </div>
    </main>
    <script>
      const status = document.getElementById("connect-icon");
      const textInput = document.getElementById("textInput");
      const appInput = document.getElementById("appInput");
      const volumeSlider = document.querySelector(
        '.custom-slider[data-command-type="volume"]',
      );
      const socket = new WebSocket(`ws://${location.host}`);

      // Sensitivity settings (persisted)
      let movementSensitivity = 1.5;
      let scrollSensitivity = 1;
      // restore stored values if available
      const storedMove = localStorage.getItem("movementSensitivity");
      if (storedMove !== null) {
        movementSensitivity = parseFloat(storedMove);
      }
      const storedScroll = localStorage.getItem("scrollSensitivity");
      if (storedScroll !== null) {
        scrollSensitivity = parseFloat(storedScroll);
      }

      function send(payload) {
        if (socket.readyState === WebSocket.OPEN) {
          socket.send(JSON.stringify(payload));
        }
      }

      socket.addEventListener("open", () => {
        status.setAttribute("stroke", "#22c55e");
      });

      socket.addEventListener("close", () => {
        status.setAttribute("stroke", "#f87171");
      });

      socket.addEventListener("error", () => {
        status.setAttribute("stroke", "#f87171");
      });

      socket.addEventListener("message", (event) => {
        let payload;

        try {
          payload = JSON.parse(event.data);
        } catch {
          return;
        }

        if (payload.type === "state" && typeof payload.volume === "number") {
          if (volumeSlider) {
            volumeSlider.dataset.value = String(payload.volume);
            const fill = volumeSlider.querySelector('.fill');
            const min = parseFloat(volumeSlider.dataset.min || 0);
            const max = parseFloat(volumeSlider.dataset.max || 100);
            const val = parseFloat(volumeSlider.dataset.value);
            const pct = ((val - min) / (max - min)) * 100;
            if (fill) fill.style.width = pct + '%';
          }
        }
      });

      document.querySelectorAll(".tab-title").forEach((tab) => {
        tab.addEventListener("click", () => {
          document
            .querySelectorAll(".tab-title")
            .forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          document.querySelectorAll(".layout").forEach((layout) => {
            layout.style.display = "none";
          });
          const layoutId = tab.textContent.trim().toLowerCase() + "-layout";
          document.getElementById(layoutId).style.display = "unset";
        });
      });

      document.querySelectorAll("[data-command]").forEach((button) => {
        button.addEventListener("click", () => {
          send(JSON.parse(button.dataset.command));
        });
      });

      document.getElementById("sendText").addEventListener("click", () => {
        send({ type: "text", value: textInput.value });
        textInput.value = "";
        textInput.focus();
      });

      // modal handlers
      document.getElementById("openTextModal").addEventListener("click", () => {
        document.getElementById("textModal").classList.remove("hidden");
        textInput.focus();
      });
      document
        .getElementById("closeTextModal")
        .addEventListener("click", () => {
          document.getElementById("textModal").classList.add("hidden");
        });

      document.getElementById("settings").addEventListener("click", () => {
        document.getElementById("settingsModal").classList.remove("hidden");
      });
      document
        .getElementById("closeSettingsModal")
        .addEventListener("click", () => {
          document.getElementById("settingsModal").classList.add("hidden");
        });

      // Settings sliders
      document
        .getElementById("movementSensitivity")
        .addEventListener("input", (e) => {
          movementSensitivity = parseFloat(e.target.value);
          document.getElementById("movementValue").textContent =
            movementSensitivity + "x";
          localStorage.setItem("movementSensitivity", movementSensitivity);
        });
      document
        .getElementById("scrollSensitivity")
        .addEventListener("input", (e) => {
          scrollSensitivity = parseFloat(e.target.value);
          document.getElementById("scrollValue").textContent =
            scrollSensitivity + "x";
          localStorage.setItem("scrollSensitivity", scrollSensitivity);
        });

      // Initialize slider values
      document.getElementById("movementSensitivity").value =
        movementSensitivity;
      document.getElementById("scrollSensitivity").value = scrollSensitivity;
      document.getElementById("movementValue").textContent =
        movementSensitivity + "x";
      document.getElementById("scrollValue").textContent =
        scrollSensitivity + "x";

      document.getElementById("openApp").addEventListener("click", () => {
        send({ type: "app", app: appInput.value });
        appInput.value = "";
      });

      document.getElementById("reconnect").addEventListener("click", () => {
        location.reload();
      });

      // custom slider helper
      function setupCustomSlider(slider) {
        const fill = slider.querySelector(".fill");
        const min = parseFloat(slider.dataset.min || 0);
        const max = parseFloat(slider.dataset.max || 1);
        const gran = parseFloat(slider.dataset.granularity || 0);
        let value = parseFloat(slider.dataset.value || min);
        // allow overriding from stored global settings
        if (slider.id === "movementSensitivity") {
          value = movementSensitivity;
        } else if (slider.id === "scrollSensitivity") {
          value = scrollSensitivity;
        }
        // rounding helper
        const align = (v) => {
          if (gran > 0) {
            return Math.round(v / gran) * gran;
          }
          return v;
        };
        value = align(value);

        function updateFill() {
          const pct = ((value - min) / (max - min)) * 100;
          if (fill) fill.style.width = pct + "%";
        }

        function setValue(newVal) {
          if (gran > 0) {
            newVal = Math.round(newVal / gran) * gran;
          }
          value = Math.max(min, Math.min(max, newVal));
          slider.dataset.value = value;
          updateFill();
          const inputEvent = new Event("input", { bubbles: true });
          slider.dispatchEvent(inputEvent);
        }

        updateFill();

        const rect = () => slider.getBoundingClientRect();
        const pointerToValue = (clientX) => {
          const r = rect();
          const x = clientX - r.left;
          return min + (x / r.width) * (max - min);
        };

        slider.addEventListener("click", (e) => {
          setValue(pointerToValue(e.clientX));
        });
        slider.addEventListener(
          "touchstart",
          (e) => {
            e.stopPropagation();
            setValue(pointerToValue(e.touches[0].clientX));
          },
          { passive: false },
        );
        slider.addEventListener(
          "touchmove",
          (e) => {
            e.stopPropagation();
            setValue(pointerToValue(e.touches[0].clientX));
          },
          { passive: false },
        );
        slider.addEventListener(
          "touchend",
          (e) => {
            e.stopPropagation();
          },
          { passive: false },
        );
        slider.addEventListener("mousedown", (e) => {
          const move = (evt) => setValue(pointerToValue(evt.clientX));
          const up = () => {
            document.removeEventListener("mousemove", move);
            document.removeEventListener("mouseup", up);
          };
          document.addEventListener("mousemove", move);
          document.addEventListener("mouseup", up);
        });
      }

      // initialize all custom sliders
      document.querySelectorAll(".custom-slider").forEach((slider) => {
        setupCustomSlider(slider);

        // shared input handling
        slider.addEventListener("input", () => {
          const val = parseFloat(slider.dataset.value);
          const type = slider.dataset.commandType;
          if (type === "volume") {
            send({
              type: "system",
              action: "setVolume",
              value: Math.round(val),
            });
          } else if (type === "brightness") {
            send({
              type: "system",
              action: "setBrightness",
              value: Math.round(val),
            });
          } else if (slider.id === "movementSensitivity") {
            movementSensitivity = val;
            document.getElementById("movementValue").textContent =
              movementSensitivity + "x";
            localStorage.setItem("movementSensitivity", movementSensitivity);
          } else if (slider.id === "scrollSensitivity") {
            scrollSensitivity = val;
            document.getElementById("scrollValue").textContent =
              scrollSensitivity + "x";
            localStorage.setItem("scrollSensitivity", scrollSensitivity);
          }
        });
      });

      // text section helpers
      let shiftActive = false;
      const shiftBtn = document.getElementById("shiftToggle");
      if (shiftBtn) {
        shiftBtn.addEventListener("click", () => {
          shiftActive = !shiftActive;
          shiftBtn.classList.toggle("active", shiftActive);
        });
      }

      document.querySelectorAll("#textArrows .arrow-button").forEach((btn) => {
        btn.addEventListener("click", () => {
          const key = btn.dataset.key;
          let combo = key;
          if (shiftActive) combo = `shift+${key}`;
          send({ type: "key", key: combo });
        });
      });

      // Swipe detection for tab switching in panel
      const panel = document.querySelector("section.panel");
      let startX, startY;

      panel.addEventListener(
        "touchstart",
        (e) => {
          startX = e.touches[0].clientX;
          startY = e.touches[0].clientY;
        },
        { passive: false },
      );

      panel.addEventListener(
        "touchmove",
        (e) => {
          // Prevent default if it's a potential horizontal swipe
          const currentX = e.touches[0].clientX;
          const currentY = e.touches[0].clientY;
          const deltaX = Math.abs(currentX - startX);
          const deltaY = Math.abs(currentY - startY);
          if (deltaX > 10 && deltaX > deltaY) {
            e.preventDefault();
          }
        },
        { passive: false },
      );

      panel.addEventListener(
        "touchend",
        (e) => {
          if (!startX) return;
          const endX = e.changedTouches[0].clientX;
          const endY = e.changedTouches[0].clientY;
          const deltaX = endX - startX;
          const deltaY = endY - startY;
          if (Math.abs(deltaX) > 50 && Math.abs(deltaY) < 50) {
            // horizontal swipe longer than 120px
            const tabs = document.querySelectorAll(".tab-title");
            const activeTab = document.querySelector(".tab-title.active");
            let activeIndex = Array.from(tabs).indexOf(activeTab);
            if (deltaX > 0) {
              // swipe right, previous tab
              activeIndex = Math.max(0, activeIndex - 1);
            } else {
              // swipe left, next tab
              activeIndex = Math.min(tabs.length - 1, activeIndex + 1);
            }
            tabs[activeIndex].click();
          }
          startX = null;
          startY = null;
        },
        { passive: false },
      );

      function attachTouchSurface(element, moveType) {
        let startTouches = [];
        let lastPoint = null;
        let moved = false;
        let tapCount = 0;
        let lastTapTime = 0;
        let tapTimeout = null;

        element.addEventListener(
          "touchstart",
          (event) => {
            event.preventDefault();
            startTouches = Array.from(event.touches).map((touch) => ({
              x: touch.clientX,
              y: touch.clientY,
            }));
            lastPoint = startTouches[0] || null;
            moved = false;
          },
          { passive: false },
        );

        element.addEventListener(
          "touchmove",
          (event) => {
            event.preventDefault();
            const touches = Array.from(event.touches);
            if (!touches.length) {
              return;
            }

            if (touches.length === 1) {
              const point = { x: touches[0].clientX, y: touches[0].clientY };
              if (lastPoint) {
                send({
                  type: moveType,
                  dx: (point.x - lastPoint.x) * movementSensitivity,
                  dy: (point.y - lastPoint.y) * movementSensitivity,
                });
                moved = true;
              }
              lastPoint = point;
              return;
            }

            if (touches.length >= 2) {
              const average = {
                x: (touches[0].clientX + touches[1].clientX) / 2,
                y: (touches[0].clientY + touches[1].clientY) / 2,
              };
              if (lastPoint) {
                send({
                  type: "scroll",
                  dx: (average.x - lastPoint.x) * scrollSensitivity,
                  dy: (average.y - lastPoint.y) * scrollSensitivity,
                });
                moved = true;
              }
              lastPoint = average;
            }
          },
          { passive: false },
        );

        element.addEventListener(
          "touchend",
          (event) => {
            event.preventDefault();
            if (
              !moved &&
              startTouches.length === 1 &&
              event.touches.length === 0
            ) {
              const now = Date.now();
              if (now - lastTapTime > 200) {
                tapCount = 1;
              } else {
                tapCount++;
              }
              lastTapTime = now;

              if (tapTimeout) {
                clearTimeout(tapTimeout);
              }

              tapTimeout = setTimeout(() => {
                if (tapCount === 1) {
                  send({ type: "click", button: "left" });
                } else if (tapCount === 2) {
                  send({ type: "doubleClick", button: "left" });
                } else if (tapCount === 3) {
                  send({ type: "tripleClick", button: "left" });
                }
                tapCount = 0;
              }, 200);
            }
            startTouches = [];
            lastPoint = null;
          },
          { passive: false },
        );
      }

      attachTouchSurface(document.getElementById("touchpad"), "move");
    </script>
  </body>
</html>
